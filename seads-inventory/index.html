<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEAds 在庫管理システム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #0058A9;
      --primary-dark: #004080;
      --sub: #E8F0FA;
      --white: #FFFFFF;
      --surface: #FFFFFF;
      --bg: #f4f7fb;
      --accent: #FF6B35;
      --accent-light: #FFF0EB;
      --text: #1a1a2e;
      --text-muted: #666;
      --border: #dce6f5;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,88,169,0.10);
      --ok-bg: #E8F5E9;
      --ok-text: #2e7d32;
      --low-row: #fff5f0;
      --toast-bg: #333;
      --header-grad: linear-gradient(135deg, #0058A9 0%, #0074D9 100%);
      --spring: cubic-bezier(.34,1.56,.64,1);
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s;
    }

    /* ─── ヘッダー ─── */
    header {
      background: var(--header-grad);
      color: var(--white);
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header .logo-placeholder {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.25);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .header-back {
      margin-right: 4px;
      cursor: pointer;
      background: none;
      border: none;
      color: var(--white);
      font-size: 20px;
      padding: 4px 8px;
      border-radius: 6px;
      display: none;
    }
    .header-back:hover { background: rgba(255,255,255,0.15); }

    /* ─── 接続状態 ─── */
    #connection-status {
      margin-left: auto;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: 0.9;
    }
    #connection-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4CAF50;
      transition: background 0.3s;
    }
    #connection-dot.offline { background: #FF5252; }

    /* ─── メインコンテンツ ─── */
    main { padding: 16px; max-width: 900px; margin: 0 auto; }

    /* ─── 画面切り替え ─── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ─── セクションヘッダー ─── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 8px;
      flex-wrap: wrap;
    }
    .section-header h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }

    /* ─── ボタン ─── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.25s var(--spring), box-shadow 0.2s;
      white-space: nowrap;
      min-height: 44px;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: scale(0.93); }
    .btn-primary { background: var(--primary); color: var(--white); }
    .btn-primary:hover { background: var(--primary-dark); box-shadow: 0 4px 14px rgba(0,88,169,0.35); }
    .btn-secondary { background: var(--sub); color: var(--primary); border: 1.5px solid var(--border); }
    .btn-secondary:hover { filter: brightness(0.96); }
    .btn-danger { background: #fff0f0; color: #d32f2f; border: 1.5px solid #ffd0d0; }
    .btn-danger:hover { background: #ffd0d0; }
    .btn-accent { background: var(--accent); color: var(--white); }
    .btn-accent:hover { background: #e55a25; }
    .btn-sm { padding: 6px 12px; font-size: 13px; min-height: 36px; }
    .btn-icon {
      width: 44px; height: 44px;
      padding: 0;
      border-radius: 8px;
      justify-content: center;
      font-size: 18px;
    }
    .btn-icon.btn-sm { width: 36px; height: 36px; font-size: 15px; }
    .btn[disabled] { opacity: 0.45; cursor: not-allowed; }

    /* ─── カード ─── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      animation: cardIn 0.4s var(--spring) both;
      animation-delay: calc(var(--i, 0) * 45ms);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px) scale(0.98); }
      to   { opacity: 1; transform: none; }
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .card-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .card-meta { font-size: 13px; color: var(--text-muted); }
    .card-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* ─── バッジ ─── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-alert { background: var(--accent); color: #fff; animation: badgePulse 2.4s ease-in-out infinite; }
    @keyframes badgePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,53,0.45); }
      50% { box-shadow: 0 0 0 5px rgba(255,107,53,0); }
    }
    .badge-ok { background: var(--ok-bg); color: var(--ok-text); }
    .badge-info { background: var(--sub); color: var(--primary); }
    .badge-past { background: var(--border); color: var(--text-muted); }
    .badge-upcoming { background: var(--sub); color: var(--primary); }

    /* ─── 企画タブ（横スライド） ─── */
    .tabs-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 14px;
      -webkit-overflow-scrolling: touch;
    }
    .tab-chip {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      padding: 8px 16px;
      border-radius: 20px;
      background: var(--surface);
      color: var(--primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      border: 1.5px solid var(--border);
      transition: background 0.15s, color 0.15s, transform 0.3s var(--spring), box-shadow 0.2s;
    }
    .tab-chip:hover { background: var(--sub); transform: translateY(-1px); }
    .tab-chip:active { transform: scale(0.94); }
    .tab-chip.active { background: var(--primary); color: var(--white); border-color: var(--primary); transform: scale(1.06); box-shadow: 0 3px 10px rgba(0,88,169,0.3); }
    .tab-chip-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-right: 6px; }
    .tab-chip.active .tab-chip-dot { background: var(--white); }
    .tab-chip-add { color: var(--text-muted); border-style: dashed; justify-content: center; width: 40px; padding: 8px; }

    /* ─── ダッシュボード企画アクションバー ─── */
    .dashboard-action-bar {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: var(--sub);
      border-radius: var(--radius);
    }


    /* ─── カード（クリック可能） ─── */
    .clickable-card { cursor: pointer; transition: box-shadow 0.2s, transform 0.3s var(--spring); }
    .clickable-card:hover { box-shadow: 0 6px 24px rgba(0,88,169,0.18); transform: translateY(-2px); }
    .clickable-card:active { transform: scale(0.985); }
    .clickable-card .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 6px;
    }

    /* ─── 詳細情報 ─── */
    .info-box {
      background: var(--sub);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .info-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--primary-dark);
    }
    .info-item i { font-size: 13px; opacity: 0.7; }

    /* ─── タップ編集 ─── */
    .tap-edit { cursor: pointer; border-bottom: 1px dashed transparent; transition: border-color 0.15s; }
    .tap-edit:hover { border-bottom-color: currentColor; }

    /* ─── 部品テーブル ─── */
    .parts-table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    thead th {
      background: var(--sub);
      color: var(--primary);
      font-weight: 700;
      padding: 10px 8px;
      text-align: left;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 10px 8px; vertical-align: middle; }
    tbody tr.low-stock { background: var(--low-row); }
    tbody tr.low-stock .stock-value { color: var(--accent); font-weight: 700; }

    /* ─── 在庫クイック入力 ─── */
    .stock-control {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stock-input {
      width: 64px;
      height: 44px;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .stock-input:focus { border-color: var(--primary); }
    .stock-input.low { border-color: var(--accent); color: var(--accent); }
    .stock-control .btn-icon.btn-sm { font-size: 12px; font-weight: 700; width: auto; min-width: 36px; padding: 0 6px; }

    /* ─── 状態バッジ ─── */
    .status-badge {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }
    .status-ok { background: var(--ok-bg); color: var(--ok-text); }
    .status-low { background: var(--accent-light); color: var(--accent); }

    /* ─── モーダル ─── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; animation: overlayIn 0.2s ease both; }
    @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 440px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.20);
      animation: modalPop 0.35s var(--spring) both;
    }
    @keyframes modalPop {
      from { opacity: 0; transform: translateY(22px) scale(0.95); }
      to   { opacity: 1; transform: none; }
    }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--primary); }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 5px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--primary); }
    .form-group .hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }

    /* ─── 空状態 ─── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state i { font-size: 40px; color: var(--border); margin-bottom: 12px; display: block; }
    .empty-state p { font-size: 14px; line-height: 1.7; }
    .empty-emoji {
      font-size: 52px;
      display: block;
      margin-bottom: 10px;
      animation: emojiBob 2.6s ease-in-out infinite;
    }
    @keyframes emojiBob {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-8px) rotate(3deg); }
    }

    /* ─── 充足ゲージ ─── */
    .gauge {
      width: 100%;
      height: 8px;
      background: var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-top: 8px;
    }
    .gauge-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #34c05e, #6fd98b);
      transition: width 0.6s var(--spring);
    }
    .gauge-fill.low { background: linear-gradient(90deg, var(--accent), #ffa04d); }
    .gauge-mini { height: 6px; margin-top: 6px; max-width: 160px; }
    .gauge-label { font-size: 11px; color: var(--text-muted); margin-top: 3px; display: block; }

    /* ─── 紙吹雪 ─── */
    .confetti-piece {
      position: fixed;
      top: -12px;
      width: 9px;
      height: 14px;
      z-index: 1000;
      pointer-events: none;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      to { transform: translateY(105vh) rotate(720deg); opacity: 0.6; }
    }

    /* ─── トースト ─── */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px) scale(0.9);
      background: var(--toast-bg);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 999;
      transition: transform 0.4s var(--spring);
      white-space: nowrap;
      box-shadow: 0 4px 18px rgba(0,0,0,0.25);
    }
    #toast.show { transform: translateX(-50%) translateY(0) scale(1); }

    /* ─── アニメーション抑制 ─── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ─── ローディング ─── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      color: var(--text-muted);
      gap: 10px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── レスポンシブ ─── */
    @media (max-width: 600px) {
      main { padding: 12px; }
      .form-row { flex-direction: column; }
      thead th:nth-child(4),
      tbody td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<header>
  <button class="header-back" id="btn-back" aria-label="戻る">
    <i class="fa-solid fa-arrow-left"></i>
  </button>
  <div class="logo-placeholder">
    <img src="assets/logo.png" alt="SEAds" style="height:28px;width:28px;object-fit:contain;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
    <i class="fa-solid fa-cube" style="display:none;color:#fff;font-size:16px;"></i>
  </div>
  <h1 id="header-title">SEAds 在庫管理</h1>
  <div id="connection-status">
    <div id="connection-dot"></div>
    <span id="connection-label">接続中</span>
  </div>
</header>

<!-- メインコンテンツ -->
<main>

  <!-- ─── 画面A: ダッシュボード（ワークショップ一覧） ─── -->
  <div class="screen active" id="screen-dashboard">
    <div class="section-header">
      <h2><i class="fa-solid fa-people-group" style="margin-right:6px;"></i>ワークショップ</h2>
    </div>

    <!-- 企画タブ（横スライド） -->
    <div class="tabs-scroll" id="project-tabs"></div>

    <!-- 選択中の企画のアクション -->
    <div class="dashboard-action-bar" id="dashboard-action-bar"></div>

    <!-- 最終更新 -->
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px;" id="last-updated"></p>

    <!-- ワークショップ一覧 -->
    <div id="workshop-list-main">
      <div class="loading"><div class="spinner"></div> 読み込み中...</div>
    </div>
  </div>

  <!-- ─── 画面B: 企画詳細（部品在庫の管理） ─── -->
  <div class="screen" id="screen-project">
    <div class="section-header">
      <h2 id="project-title" class="tap-edit" onclick="openEditProject()" title="タップして編集">企画詳細</h2>
      <button class="btn btn-danger btn-sm" id="btn-delete-project">
        <i class="fa-solid fa-trash"></i> 企画を削除
      </button>
    </div>

    <div class="info-box" id="project-info"></div>

    <div class="section-header">
      <h2 style="font-size:16px;"><i class="fa-solid fa-boxes-stacked" style="margin-right:6px;"></i>部品在庫</h2>
      <button class="btn btn-primary btn-sm" id="btn-add-part">
        <i class="fa-solid fa-plus"></i> 部品を追加
      </button>
    </div>

    <div class="card parts-table-wrap">
      <div id="parts-container">
        <div class="loading"><div class="spinner"></div> 読み込み中...</div>
      </div>
    </div>
  </div>

  <!-- ─── 画面C: ワークショップ詳細 ─── -->
  <div class="screen" id="screen-workshop">
    <div class="section-header">
      <h2 id="workshop-title">ワークショップ詳細</h2>
      <button class="btn btn-danger btn-sm" id="btn-delete-workshop">
        <i class="fa-solid fa-trash"></i> 削除
      </button>
    </div>

    <div class="info-box" id="workshop-info"></div>

    <div class="section-header">
      <h2 style="font-size:16px;"><i class="fa-solid fa-boxes-stacked" style="margin-right:6px;"></i>割り振られた部品</h2>
    </div>

    <div class="card parts-table-wrap">
      <div id="allocations-container">
        <div class="loading"><div class="spinner"></div> 読み込み中...</div>
      </div>
    </div>
  </div>

</main>

<!-- ─── モーダル: 企画作成 ─── -->
<div class="modal-overlay" id="modal-create-project">
  <div class="modal">
    <h2><i class="fa-solid fa-plus-circle" style="margin-right:8px;"></i>企画を作成</h2>
    <div class="form-group">
      <label>企画名 *</label>
      <input type="text" id="proj-name" placeholder="例: 段ボール工作教室" />
    </div>
    <div class="form-group">
      <label>説明</label>
      <textarea id="proj-desc" rows="2" placeholder="内容の概要を入力"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-create-project')">キャンセル</button>
      <button class="btn btn-primary" id="btn-create-proj-submit"><i class="fa-solid fa-check"></i> 作成</button>
    </div>
  </div>
</div>

<!-- ─── モーダル: 企画編集 ─── -->
<div class="modal-overlay" id="modal-edit-project">
  <div class="modal">
    <h2><i class="fa-solid fa-pen" style="margin-right:8px;"></i>企画を編集</h2>
    <div class="form-group">
      <label>企画名 *</label>
      <input type="text" id="edit-proj-name" placeholder="例: 段ボール工作教室" />
    </div>
    <div class="form-group">
      <label>説明</label>
      <textarea id="edit-proj-desc" rows="2" placeholder="内容の概要を入力"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-edit-project')">キャンセル</button>
      <button class="btn btn-primary" id="btn-edit-proj-submit"><i class="fa-solid fa-check"></i> 保存</button>
    </div>
  </div>
</div>

<!-- ─── モーダル: 部品追加 ─── -->
<div class="modal-overlay" id="modal-add-part">
  <div class="modal">
    <h2><i class="fa-solid fa-box-open" style="margin-right:8px;"></i>部品を追加</h2>
    <div class="form-group">
      <label>部品名 *</label>

<!-- Firebase設定（モジュールより先に読み込む） -->
<script src="./firebase-config.js"></script>

<!-- Firebase SDK v10 (CDN) -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import {
    getDatabase, ref, onValue, push, remove, update
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

  // ── 設定読み込み ──
  // firebase-config.js が window.FIREBASE_CONFIG をセットしている
  const firebaseConfig = window.FIREBASE_CONFIG ?? null;

  let currentProjectId = null;
  let currentWorkshopId = null;
  let currentEditPartId = null;
  let allProjects = {};
  let allWorkshops = {};
  let db;

  if (firebaseConfig && firebaseConfig.apiKey !== 'YOUR_API_KEY') {
    try {
      const app = initializeApp(firebaseConfig);
      db = getDatabase(app);
      initConnectionMonitor(db);
      initApp(db);
    } catch (e) {
      showToast('Firebase 初期化エラー: ' + e.message);
      console.error(e);
      renderDemoMode();
    }
  } else {
    // 未設定時はデモモード
    renderDemoMode();
    document.getElementById('connection-dot').classList.add('offline');
    document.getElementById('connection-label').textContent = '未接続（デモ）';
  }

  // ── 接続状態監視 ──
  function initConnectionMonitor(db) {
    const connRef = ref(db, '.info/connected');
    onValue(connRef, snap => {
      const dot = document.getElementById('connection-dot');
      const label = document.getElementById('connection-label');
      if (snap.val()) {
        dot.classList.remove('offline');
        label.textContent = 'オンライン';
      } else {
        dot.classList.add('offline');
        label.textContent = 'オフライン';
      }
    });
  }

  // ── アプリ初期化 ──

  function initApp(db) {
    onValue(ref(db, 'projects'), snap => {
      allProjects = snap.val() || {};
      rerenderCurrentScreen();
      updateLastUpdated();
    });
    onValue(ref(db, 'workshops'), snap => {
      allWorkshops = snap.val() || {};
      rerenderCurrentScreen();
      updateLastUpdated();
    });

    // ── ボタンイベント ──
    document.getElementById('btn-back').onclick = handleBack;

    // 企画作成
    document.getElementById('btn-create-proj-submit').onclick = async () => {
      const name = v('proj-name');
      if (!name) { showToast('企画名は必須です'); return; }
      try {
        await push(ref(db, 'projects'), {
          name, description: v('proj-desc'), createdAt: Date.now(), parts: null
        });
        closeModal('modal-create-project');
        clearForm(['proj-name', 'proj-desc']);
        showToast('企画を作成しました');
      } catch (e) {
        showToast('書き込みエラー: ' + e.message);
        console.error(e);
      }
    };

    // 企画編集
    window.openEditProject = () => {
      const src = allProjects[currentProjectId];
      if (!src) return;
      document.getElementById('edit-proj-name').value = src.name || '';
      document.getElementById('edit-proj-desc').value = src.description || '';
      openModal('modal-edit-project');
    };
    document.getElementById('btn-edit-proj-submit').onclick = async () => {
      const name = v('edit-proj-name');
      if (!name) { showToast('企画名は必須です'); return; }
      await update(ref(db, `projects/${currentProjectId}`), {
        name, description: v('edit-proj-desc')
      });
      closeModal('modal-edit-project');
      showToast('企画を更新しました');
    };

    // 企画削除（紐づくワークショップも一緒に削除）
    document.getElementById('btn-delete-project').onclick = async () => {
      if (!confirm('この企画を削除しますか？部品在庫と、紐づくワークショップもすべて削除されます。')) return;
      const updates = { [`projects/${currentProjectId}`]: null };
      for (const [wid, ws] of Object.entries(allWorkshops)) {
        if (ws.projectId === currentProjectId) updates[`workshops/${wid}`] = null;
      }
      await update(ref(db), updates);
      showToast('企画を削除しました');
      showDashboard();
    };

    // 部品追加
    document.getElementById('btn-add-part').onclick = () => openModal('modal-add-part');
    document.getElementById('btn-add-part-submit').onclick = async () => {
      const name = v('part-name');
      const unit = v('part-unit');
      if (!name || !unit) { showToast('部品名と単位は必須です'); return; }
      const stock = parseInt(v('part-stock')) || 0;
      const minStock = parseInt(v('part-min-stock')) || 0;
      const perParticipant = parseInt(v('part-per-participant')) || 0;
      await push(ref(db, `projects/${currentProjectId}/parts`), {
        name, unit, stock, minStock, perParticipant, updatedAt: Date.now()
      });
      closeModal('modal-add-part');
      clearForm(['part-name', 'part-unit', 'part-stock', 'part-min-stock', 'part-per-participant']);
      showToast('部品を追加しました');
    };

    // 部品編集
    document.getElementById('btn-edit-part-submit').onclick = async () => {
      const name = v('edit-part-name');
      const unit = v('edit-part-unit');
      if (!name || !unit) { showToast('部品名と単位は必須です'); return; }
      const minStock = parseInt(v('edit-part-min-stock')) || 0;
      const perParticipant = parseInt(v('edit-part-per-participant')) || 0;
      await update(ref(db, `projects/${currentProjectId}/parts/${currentEditPartId}`), {
        name, unit, minStock, perParticipant, updatedAt: Date.now()
      });
      closeModal('modal-edit-part');
      showToast('部品を更新しました');
    };

    // ワークショップ作成（参加人数に応じて自動割り振り）
    window.openCreateWorkshopModal = () => {
      if (!currentProjectId || !allProjects[currentProjectId]) { showToast('企画を選択してください'); return; }
      document.getElementById('ws-participants').value = 0;
      updateAllocationPreview();
      openModal('modal-create-workshop');
    };
    document.getElementById('ws-participants').oninput = updateAllocationPreview;

    document.getElementById('btn-create-ws-submit').onclick = async () => {
      const name = v('ws-name');
      const location = v('ws-location');
      const date = v('ws-date');
      const participants = Math.max(0, parseInt(v('ws-participants')) || 0);
      if (!name || !location || !date) { showToast('名前・開催地・日付は必須です'); return; }

      try {
        await push(ref(db, 'workshops'), {
          projectId: currentProjectId, name, description: v('ws-desc'), date, location,
          participants, createdAt: Date.now()
        });
        closeModal('modal-create-workshop');
        clearForm(['ws-name', 'ws-desc', 'ws-date', 'ws-location']);
        showToast('ワークショップを作成しました');
      } catch (e) {
        showToast('書き込みエラー: ' + e.message);
        console.error(e);
      }
    };

    // ワークショップ編集
    window.openEditWorkshop = () => {
      const ws = allWorkshops[currentWorkshopId];
      if (!ws) return;
      if (isPast(ws)) { showToast('開催日を過ぎたワークショップは編集できません'); return; }
      document.getElementById('edit-ws-name').value = ws.name || '';
      document.getElementById('edit-ws-desc').value = ws.description || '';
      document.getElementById('edit-ws-date').value = ws.date || '';
      document.getElementById('edit-ws-location').value = ws.location || '';
      document.getElementById('edit-ws-participants').value = ws.participants || 0;
      openModal('modal-edit-workshop');
    };
    document.getElementById('btn-edit-ws-submit').onclick = async () => {
      const name = v('edit-ws-name');
      const location = v('edit-ws-location');
      const date = v('edit-ws-date');
      const participants = Math.max(0, parseInt(v('edit-ws-participants')) || 0);
      if (!name || !location || !date) { showToast('名前・開催地・日付は必須です'); return; }

      await update(ref(db, `workshops/${currentWorkshopId}`), {
        name, description: v('edit-ws-desc'), date, location, participants
      });
      closeModal('modal-edit-workshop');
      showToast('ワークショップを更新しました');
    };

    // ワークショップ削除
    document.getElementById('btn-delete-workshop').onclick = async () => {
      const ws = allWorkshops[currentWorkshopId];
      if (!ws) return;
      if (!confirm('このワークショップを削除しますか？')) return;
      await remove(ref(db, `workshops/${currentWorkshopId}`));
      showToast('ワークショップを削除しました');
      showDashboard(true);
    };

    renderDashboard();
  }

  function updateAllocationPreview() {
    const participants = Math.max(0, parseInt(v('ws-participants')) || 0);
    const project = allProjects[currentProjectId];
    const parts = project?.parts || {};
    const preview = document.getElementById('ws-allocation-preview');
    const entries = Object.values(parts).map(p => `${esc(p.name)} ${(p.perParticipant || 0) * participants}${esc(p.unit)}`);
    preview.textContent = entries.length ? `必要部品: ${entries.join('、')}（在庫は日付が近い順に自動割り振り）` : '部品が登録されていません。';
  }

  function rerenderCurrentScreen() {
    if (document.getElementById('screen-dashboard').classList.contains('active')) {
      renderDashboard();
    } else if (document.getElementById('screen-project').classList.contains('active') && currentProjectId) {
      renderProject(currentProjectId);
    } else if (document.getElementById('screen-workshop').classList.contains('active') && currentWorkshopId) {
      renderWorkshop(currentWorkshopId);
    }
  }

  // ── 企画タブ描画 ──
  function renderProjectTabs() {
    const tabsEl = document.getElementById('project-tabs');
    let html = `<div class="tab-chip ${currentProjectId === null ? 'active' : ''}" onclick="selectProjectTab(null)">すべて</div>`;
    for (const [pid, proj] of Object.entries(allProjects)) {
      const { byWorkshop } = computeProjectAllocation(pid);
      const hasShortage = Object.values(byWorkshop).some(alloc => Object.values(alloc).some(a => a.shortage > 0));
      html += `<div class="tab-chip ${currentProjectId === pid ? 'active' : ''}" onclick="selectProjectTab('${pid}')">${hasShortage ? '<span class="tab-chip-dot"></span>' : ''}${esc(proj.name)}</div>`;
    }
    html += `<div class="tab-chip tab-chip-add" onclick="openModal('modal-create-project')" title="新しい企画"><i class="fa-solid fa-plus"></i></div>`;
    tabsEl.innerHTML = html;
  }

  window.selectProjectTab = (pid) => {
    currentProjectId = pid;
    renderDashboard();
  };

  // ── 割り振り計算エンジン ──
  // 企画の現在在庫を、開催予定ワークショップへ日付が近い順に割り振る。
  // 戻り値: {
  //   byWorkshop: { wsId: { partId: { need, allocated, shortage } } },
  //   remaining:  { partId: 割り振り後に残る在庫数 }
  // }
  function computeProjectAllocation(pid) {
    const project = allProjects[pid];
    const parts = project?.parts || {};
    const remaining = {};
    for (const [partId, p] of Object.entries(parts)) remaining[partId] = Math.max(0, p.stock || 0);

    const upcoming = Object.entries(allWorkshops)
      .filter(([, ws]) => ws.projectId === pid && !isPast(ws))
      .sort((a, b) => (a[1].date || '').localeCompare(b[1].date || '') || a[1].createdAt - b[1].createdAt);

    const byWorkshop = {};
    for (const [wid, ws] of upcoming) {
      const alloc = {};
      const participants = ws.participants || 0;
      for (const [partId, p] of Object.entries(parts)) {
        const need = (p.perParticipant || 0) * participants;
        const allocated = Math.min(need, Math.max(0, remaining[partId]));
        alloc[partId] = { need, allocated, shortage: need - allocated };
        remaining[partId] -= allocated;
      }
      byWorkshop[wid] = alloc;
    }
    return { byWorkshop, remaining };
  }

  // ワークショップ単体の不足リストを取得（開催済みは空）
  function computeShortage(wid, ws) {
    if (isPast(ws)) return [];
    const { byWorkshop } = computeProjectAllocation(ws.projectId);
    const alloc = byWorkshop[wid] || {};
    const parts = allProjects[ws.projectId]?.parts || {};
    const shortages = [];
    for (const [partId, a] of Object.entries(alloc)) {
      if (a.shortage > 0) {
        const p = parts[partId];
        shortages.push({ name: p?.name || '', unit: p?.unit || '', deficit: a.shortage });
      }
    }
    return shortages;
  }

  function renderWorkshopCard(wid, ws, index) {
    const past = isPast(ws);
    const shortages = computeShortage(wid, ws);
    const projectName = allProjects[ws.projectId]?.name || '(企画削除済み)';

    // 充足率ゲージ（必要合計に対する確保合計）
    let gaugeHtml = '';
    if (!past) {
      const { byWorkshop } = computeProjectAllocation(ws.projectId);
      const alloc = byWorkshop[wid] || {};
      let totalNeed = 0, totalAllocated = 0;
      for (const a of Object.values(alloc)) { totalNeed += a.need; totalAllocated += a.allocated; }
      if (totalNeed > 0) {
        const pct = Math.round(totalAllocated / totalNeed * 100);
        gaugeHtml = `<div class="gauge"><div class="gauge-fill ${pct < 100 ? 'low' : ''}" style="width:${pct}%"></div></div>
          <span class="gauge-label">材料の確保 ${pct}%（${totalAllocated}/${totalNeed}）</span>`;
      }
    }

    return `<div class="card clickable-card" style="--i:${index ?? 0}" onclick="showWorkshop('${wid}')">
      <div class="card-header">
        <div>
          <div class="card-title">${esc(ws.name)}</div>
          <div class="card-meta">
            ${currentProjectId === null ? `<span class="badge badge-info" style="margin-right:6px;"><i class="fa-solid fa-folder"></i> ${esc(projectName)}</span>` : ''}
            <i class="fa-solid fa-location-dot"></i> ${esc(ws.location || '未設定')}　<i class="fa-solid fa-calendar"></i> ${ws.date || '未設定'}
          </div>
        </div>
        ${shortages.length > 0 ? `<span class="badge badge-alert"><i class="fa-solid fa-triangle-exclamation"></i> 部品不足 ${shortages.length}件</span>` : `<span class="badge badge-ok"><i class="fa-solid fa-check"></i> 材料OK</span>`}
      </div>
      ${shortages.length > 0 ? `<p style="font-size:13px;color:var(--accent);margin-top:8px;">${shortages.map(s => `${esc(s.name)} ${s.deficit}${esc(s.unit)}不足`).join('、')}</p>` : ''}
      ${gaugeHtml}
      <div class="card-footer">
        <span class="badge badge-info"><i class="fa-solid fa-people-group"></i> 参加 ${ws.participants || 0}人</span>
        <span class="badge ${past ? 'badge-past' : 'badge-upcoming'}"><i class="fa-solid ${past ? 'fa-check' : 'fa-clock'}"></i> ${past ? '開催済み' : '開催予定'}</span>
        <span style="font-size:12px;color:var(--text-muted);">タップして詳細を見る <i class="fa-solid fa-chevron-right"></i></span>
      </div>
    </div>`;
  }

  // ── ダッシュボード描画 ──
  function renderDashboard() {
    renderProjectTabs();

    const actionBar = document.getElementById('dashboard-action-bar');
    if (currentProjectId && allProjects[currentProjectId]) {
      const proj = allProjects[currentProjectId];
      actionBar.style.display = 'flex';
      actionBar.innerHTML = `
        <strong style="margin-right:4px;color:var(--primary-dark);">${esc(proj.name)}</strong>
        <button class="btn btn-secondary btn-sm" onclick="showProject('${currentProjectId}')"><i class="fa-solid fa-boxes-stacked"></i> 部品在庫を管理</button>
        <button class="btn btn-primary btn-sm" onclick="openCreateWorkshopModal()"><i class="fa-solid fa-plus"></i> ワークショップを追加</button>
      `;
    } else {
      actionBar.style.display = 'none';
      actionBar.innerHTML = '';
    }

    const listEl = document.getElementById('workshop-list-main');

    if (Object.keys(allProjects).length === 0) {
      listEl.innerHTML = `<div class="empty-state">
        <span class="empty-emoji">🎨</span>
        <p>まだ企画がありません。<br>上のタブの「＋」から最初の企画を作ってみよう！</p>
      </div>`;
      return;
    }

    const entries = Object.entries(allWorkshops).filter(([, ws]) => currentProjectId === null || ws.projectId === currentProjectId);

    if (entries.length === 0) {
      listEl.innerHTML = `<div class="empty-state">
        <span class="empty-emoji">🛠️</span>
        <p>${currentProjectId === null ? 'ワークショップはこれから！<br>企画タブを選んで最初の1件を追加しよう。' : 'この企画のワークショップはまだ0件。<br>「ワークショップを追加」から登録してみよう！'}</p>
      </div>`;
      return;
    }

    const upcoming = entries.filter(([, ws]) => !isPast(ws)).sort((a, b) => (a[1].date || '').localeCompare(b[1].date || ''));
    const past = entries.filter(([, ws]) => isPast(ws)).sort((a, b) => (b[1].date || '').localeCompare(a[1].date || ''));
    const ordered = [...upcoming, ...past];

    listEl.innerHTML = ordered.map(([wid, ws], i) => renderWorkshopCard(wid, ws, i)).join('');
  }

  // ── 企画詳細描画 ──
  function renderProject(pid) {
    const proj = allProjects[pid];
    if (!proj) return;

    document.getElementById('project-title').textContent = proj.name;
    document.getElementById('project-info').innerHTML = `
      <div class="info-item tap-edit" onclick="openEditProject()" title="タップして編集"><i class="fa-solid fa-note-sticky"></i>${proj.description ? esc(proj.description) : '説明なし'}</div>
    `;

    const container = document.getElementById('parts-container');
    const parts = proj.parts || {};
    if (Object.keys(parts).length === 0) {
      container.innerHTML = `<div class="empty-state">
        <span class="empty-emoji">📦</span>
        <p>部品箱はまだ空っぽ。<br>「部品を追加」から使う材料を登録しよう！</p>
      </div>`;
    } else {
      const { byWorkshop, remaining } = computeProjectAllocation(pid);
      // 部品ごとの必要合計と不足合計を集計
      const totals = {};
      for (const alloc of Object.values(byWorkshop)) {
        for (const [partId, a] of Object.entries(alloc)) {
          if (!totals[partId]) totals[partId] = { need: 0, shortage: 0 };
          totals[partId].need += a.need;
          totals[partId].shortage += a.shortage;
        }
      }

      let rows = '';
      for (const [partId, p] of Object.entries(parts)) {
        const t = totals[partId] || { need: 0, shortage: 0 };
        const isShort = t.shortage > 0;
        const stockPct = t.need > 0 ? Math.min(100, Math.round(Math.max(0, p.stock || 0) / t.need * 100)) : 100;
        rows += `<tr class="${isShort ? 'low-stock' : ''}">
          <td><strong class="tap-edit" onclick="openEditPart('${partId}')" title="タップして編集">${esc(p.name)}</strong><br>
            <span style="font-size:12px;color:var(--text-muted);">${p.perParticipant ?? 0}${esc(p.unit)}/人・最低${p.minStock}${esc(p.unit)}</span>
            <div class="gauge gauge-mini"><div class="gauge-fill ${stockPct < 100 ? 'low' : ''}" style="width:${stockPct}%"></div></div>
          </td>
          <td>
            <div class="stock-control">
              <button class="btn btn-secondary btn-icon btn-sm" onclick="adjustStock('${partId}',-10)" title="-10">-10</button>
              <button class="btn btn-secondary btn-icon btn-sm" onclick="adjustStock('${partId}',-1)" title="-1"><i class="fa-solid fa-minus"></i></button>
              <input class="stock-input ${isShort ? 'low' : ''}" type="number" min="0"
                value="${Math.max(0, p.stock || 0)}"
                id="stock-input-${partId}" />
              <button class="btn btn-secondary btn-icon btn-sm" onclick="adjustStock('${partId}',1)" title="+1"><i class="fa-solid fa-plus"></i></button>
              <button class="btn btn-secondary btn-icon btn-sm" onclick="adjustStock('${partId}',10)" title="+10">+10</button>
              <button class="btn btn-primary btn-sm" onclick="applyStock('${partId}')" title="入力した数を保存して割り振り"><i class="fa-solid fa-check"></i> 反映</button>
            </div>
          </td>
          <td style="white-space:nowrap;">${t.need}${esc(p.unit)}</td>
          <td style="white-space:nowrap;">${Math.max(0, remaining[partId] ?? 0)}${esc(p.unit)}</td>
          <td><span class="status-badge ${isShort ? 'status-low' : 'status-ok'}">${isShort ? `⚠ ${t.shortage}${esc(p.unit)}不足` : '✓ 充足'}</span></td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="deletePart('${partId}')" title="削除">
              <i class="fa-solid fa-trash"></i>
            </button>
          </td>
        </tr>`;
      }
      container.innerHTML = `<table>
        <thead>
          <tr>
            <th>部品名</th>
            <th>在庫数</th>
            <th>予定必要数</th>
            <th>割り振り後の残り</th>
            <th>状態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <p style="font-size:12px;color:var(--text-muted);margin-top:10px;">
        <i class="fa-solid fa-circle-info"></i> 在庫数を変えて「反映」を押すと、開催日が近いワークショップから順に自動で割り振り直されます。
      </p>`;
    }
  }

  // ── ワークショップ詳細描画 ──
  function renderWorkshop(wid) {
    const ws = allWorkshops[wid];
    if (!ws) return;
    const past = isPast(ws);

    document.getElementById('workshop-title').textContent = ws.name;
    document.getElementById('btn-delete-workshop').disabled = false;

    document.getElementById('workshop-info').innerHTML = `
      <div class="info-item ${past ? '' : 'tap-edit'}" ${past ? '' : `onclick="openEditWorkshop()" title="タップして編集"`}><i class="fa-solid fa-location-dot"></i>${esc(ws.location || '未設定')}</div>
      <div class="info-item ${past ? '' : 'tap-edit'}" ${past ? '' : `onclick="openEditWorkshop()" title="タップして編集"`}><i class="fa-solid fa-calendar"></i>${ws.date || '未設定'}</div>
      <div class="info-item ${past ? '' : 'tap-edit'}" ${past ? '' : `onclick="openEditWorkshop()" title="タップして編集"`}><i class="fa-solid fa-people-group"></i>参加 ${ws.participants || 0}人</div>
      <div class="info-item ${past ? '' : 'tap-edit'}" ${past ? '' : `onclick="openEditWorkshop()" title="タップして編集"`}><i class="fa-solid fa-note-sticky"></i>${ws.description ? esc(ws.description) : '説明なし'}</div>
      <span class="badge ${past ? 'badge-past' : 'badge-upcoming'}"><i class="fa-solid ${past ? 'fa-check' : 'fa-clock'}"></i> ${past ? '開催済み（割り振り確定）' : '開催予定'}</span>
    `;

    const container = document.getElementById('allocations-container');
    const parts = allProjects[ws.projectId]?.parts || {};

    if (Object.keys(parts).length === 0) {
      container.innerHTML = `<div class="empty-state">
        <span class="empty-emoji">📦</span>
        <p>この企画にはまだ部品が登録されていません。<br>企画ページの「部品を追加」から登録すると、ここに自動で割り振られます。</p>
      </div>`;
      return;
    }

    if (past) {
      // 開催済み: 必要だった数のみ表示
      let rows = '';
      for (const p of Object.values(parts)) {
        const need = (p.perParticipant || 0) * (ws.participants || 0);
        rows += `<tr>
          <td><strong>${esc(p.name)}</strong></td>
          <td>${need}${esc(p.unit)}</td>
        </tr>`;
      }
      container.innerHTML = `<table>
        <thead><tr><th>部品名</th><th>使用した数</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
      return;
    }

    const { byWorkshop } = computeProjectAllocation(ws.projectId);
    const alloc = byWorkshop[wid] || {};
    let rows = '';
    for (const [partId, p] of Object.entries(parts)) {
      const a = alloc[partId] || { need: 0, allocated: 0, shortage: 0 };
      const isShort = a.shortage > 0;
      const pct = a.need > 0 ? Math.round(a.allocated / a.need * 100) : 100;
      rows += `<tr class="${isShort ? 'low-stock' : ''}">
        <td><strong>${esc(p.name)}</strong></td>
        <td>${a.need}${esc(p.unit)}</td>
        <td>${a.allocated}${esc(p.unit)}
          <div class="gauge gauge-mini"><div class="gauge-fill ${pct < 100 ? 'low' : ''}" style="width:${pct}%"></div></div>
        </td>
        <td><span class="status-badge ${isShort ? 'status-low' : 'status-ok'}">${isShort ? `⚠ ${a.shortage}${esc(p.unit)}不足` : '✓ 確保済み'}</span></td>
      </tr>`;
    }
    container.innerHTML = `<table>
      <thead><tr><th>部品名</th><th>必要数</th><th>確保できる数</th><th>状態</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <p style="font-size:12px;color:var(--text-muted);margin-top:10px;">
      <i class="fa-solid fa-circle-info"></i> 在庫は開催日が近いワークショップから順に割り振られます。
    </p>`;
  }

  // ── 在庫操作（企画倉庫） ──
  window.adjustStock = async (partId, delta) => {
    const current = allProjects[currentProjectId]?.parts?.[partId]?.stock ?? 0;
    const next = Math.max(0, current + delta);
    await update(ref(db, `projects/${currentProjectId}/parts/${partId}`), { stock: next, updatedAt: Date.now() });
  };

  window.setStock = async (partId, val) => {
    const next = Math.max(0, parseInt(val) || 0);
    await update(ref(db, `projects/${currentProjectId}/parts/${partId}`), { stock: next, updatedAt: Date.now() });
  };

  // 企画内のどこかに不足があるか
  function projectHasShortage(pid) {
    const { byWorkshop } = computeProjectAllocation(pid);
    return Object.values(byWorkshop).some(alloc => Object.values(alloc).some(a => a.shortage > 0));
  }

  // 入力欄の値を保存して割り振りを更新
  window.applyStock = async (partId) => {
    const input = document.getElementById(`stock-input-${partId}`);
    const next = Math.max(0, parseInt(input.value) || 0);
    const pid = currentProjectId;
    const hadShortage = projectHasShortage(pid);
    await update(ref(db, `projects/${pid}/parts/${partId}`), { stock: next, updatedAt: Date.now() });
    // onValue反映後に判定（不足→全充足になった瞬間だけお祝い）
    setTimeout(() => {
      if (hadShortage && !projectHasShortage(pid)) {
        fireConfetti();
        showToast('🎉 全ワークショップの材料が揃いました！');
      } else {
        showToast('在庫を反映し、割り振りを更新しました');
      }
    }, 350);
  };

  // ── 紙吹雪 ──
  function fireConfetti() {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const colors = ['#0058A9', '#FF6B35', '#34c05e', '#ffd23f', '#7db9f0', '#ff8fb1'];
    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDuration = (1.8 + Math.random() * 1.6) + 's';
      piece.style.animationDelay = (Math.random() * 0.4) + 's';
      piece.style.transform = `rotate(${Math.random() * 360}deg)`;
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 4200);
    }
  }

  window.openEditPart = (partId) => {
    const p = allProjects[currentProjectId]?.parts?.[partId];
    if (!p) return;
    currentEditPartId = partId;
    document.getElementById('edit-part-name').value = p.name || '';
    document.getElementById('edit-part-unit').value = p.unit || '';
    document.getElementById('edit-part-min-stock').value = p.minStock ?? 0;
    document.getElementById('edit-part-per-participant').value = p.perParticipant ?? 0;
    openModal('modal-edit-part');
  };

  window.deletePart = async (partId) => {
    if (!confirm('この部品を削除しますか？')) return;
    await remove(ref(db, `projects/${currentProjectId}/parts/${partId}`));
    showToast('部品を削除しました');
  };

  // ── 開催日判定 ──
  function isPast(ws) {
    if (!ws.date) return false;
    const todayStr = new Date().toISOString().slice(0, 10);
    return ws.date < todayStr;
  }

  // ── 画面遷移 ──
  window.showProject = (pid) => {
    currentProjectId = pid;
    currentWorkshopId = null;
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-project').classList.add('active');
    document.getElementById('btn-back').style.display = 'flex';
    document.getElementById('header-title').textContent = allProjects[pid]?.name || '企画詳細';
    renderProject(pid);
  };

  window.showWorkshop = (wid) => {
    currentWorkshopId = wid;
    const ws = allWorkshops[wid];
    if (ws) currentProjectId = ws.projectId;
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-workshop').classList.add('active');
    document.getElementById('btn-back').style.display = 'flex';
    document.getElementById('header-title').textContent = ws?.name || 'ワークショップ詳細';
    renderWorkshop(wid);
  };

  function showDashboard(preserveProjectId) {
    if (!preserveProjectId) currentProjectId = null;
    currentWorkshopId = null;
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-dashboard').classList.add('active');
    document.getElementById('btn-back').style.display = 'none';
    document.getElementById('header-title').textContent = 'SEAds 在庫管理';
    renderDashboard();
  }

  function handleBack() {
    // screen-project / screen-workshop ではすでに currentProjectId がセット済みなので維持する
    showDashboard(true);
  }

  // ── デモモード ──
  function renderDemoMode() {
    document.getElementById('workshop-list-main').innerHTML = `<div class="card" style="border:2px dashed var(--accent);">
      <p style="font-size:14px;color:var(--accent);font-weight:700;margin-bottom:8px;">
        <i class="fa-solid fa-info-circle"></i> デモモード（Firebase未接続）
      </p>
      <p style="font-size:13px;color:var(--text-muted);">
        <code>firebase-config.js</code> にFirebaseの設定値を入力すると、リアルタイム同期が有効になります。<br>
        詳しくは <strong>README.md</strong> を参照してください。
      </p>
    </div>`;
    document.getElementById('connection-dot').classList.add('offline');
    document.getElementById('connection-label').textContent = '未接続';
  }

  // ── ユーティリティ ──
  function v(id) { return document.getElementById(id).value.trim(); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function clearForm(ids) { ids.forEach(id => { document.getElementById(id).value = id.includes('stock') || id.includes('participant') ? '0' : ''; }); }
  function updateLastUpdated() {
    const el = document.getElementById('last-updated');
    el.textContent = `最終確認: ${new Date().toLocaleString('ja-JP')}`;
  }

  window.openModal = (id) => {
    if (id === 'modal-create-workshop') updateAllocationPreview();
    document.getElementById(id).classList.add('open');
  };
  window.closeModal = (id) => document.getElementById(id).classList.remove('open');

  // モーダルの外クリックで閉じる
  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
  window.showToast = showToast;
</script>

</body>
</html>
